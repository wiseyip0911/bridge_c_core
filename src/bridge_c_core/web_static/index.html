<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>本机消息看板</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2a3545;
      --text: #e8eef5;
      --muted: #8b9bb4;
      --in: #2d3a4d;
      --out: #1e4d7a;
      --accent: #3d8fd1;
      --err: #c94c4c;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      font-family: system-ui, "Segoe UI", Roboto, "PingFang SC", sans-serif;
      background: var(--bg); color: var(--text);
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      background: var(--panel); font-size: 14px;
    }
    header code { font-size: 12px; color: var(--muted); }
    .layout {
      display: flex; height: calc(100vh - 48px);
    }
    aside {
      width: 280px; min-width: 220px; border-right: 1px solid var(--border);
      background: var(--panel); overflow-y: auto;
    }
    .peer {
      padding: 12px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
    }
    .peer:hover { background: #222c3d; }
    .peer.active { background: #243149; border-left: 3px solid var(--accent); }
    .peer-id { font-weight: 600; font-size: 14px; }
    .peer-preview {
      margin-top: 4px; font-size: 12px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .peer-meta { margin-top: 2px; font-size: 11px; color: var(--muted); }
    main {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }
    #thread-head {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      font-size: 15px; font-weight: 600;
    }
    #messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .bubble-row { display: flex; }
    .bubble-row.in { justify-content: flex-start; }
    .bubble-row.out { justify-content: flex-end; }
    .bubble {
      max-width: 78%; padding: 10px 12px; border-radius: 12px;
      font-size: 14px; line-height: 1.45; white-space: pre-wrap; word-break: break-word;
    }
    .bubble.in { background: var(--in); border: 1px solid var(--border); }
    .bubble.out { background: var(--out); border: 1px solid #2a5a8a; }
    .bubble-meta {
      margin-top: 4px; font-size: 11px; color: var(--muted);
    }
    #composer {
      display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border);
      background: var(--panel); align-items: flex-end;
    }
    #composer textarea {
      flex: 1; min-height: 44px; max-height: 160px; resize: vertical;
      padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: #121a26; color: var(--text); font-size: 14px;
    }
    button {
      padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer;
      background: var(--accent); color: #fff; font-weight: 600; font-size: 14px;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    #status { font-size: 12px; color: var(--muted); }
    #err { color: var(--err); font-size: 12px; max-width: 40%; text-align: right; }
    .empty { color: var(--muted); padding: 24px; text-align: center; font-size: 14px; }
  </style>
</head>
<body>
  <header>
    <div>本机消息看板 <span id="status"></span></div>
    <div id="err"></div>
  </header>
  <div class="layout">
    <aside id="sidebar"></aside>
    <main>
      <div id="thread-head">请选择左侧联系人</div>
      <div id="messages"><div class="empty">加载中…</div></div>
      <div id="composer">
        <textarea id="input" placeholder="输入消息… (Enter 发送, Shift+Enter 换行)" rows="2"></textarea>
        <button id="send" type="button">发送</button>
      </div>
    </main>
  </div>
  <script>
    const POLL_MS = 1500;
    const SK = "bridge-c-chat-web:peer";

    let selectedPeer = sessionStorage.getItem(SK) || "";
    let lastSnapshot = null;

    function setErr(msg) {
      document.getElementById("err").textContent = msg || "";
    }

    function fmtLocal(ts) {
      if (!ts) return "";
      const s = ts.replace("Z", "+00:00");
      const d = new Date(s);
      if (isNaN(d.getTime())) return ts;
      return d.toLocaleString();
    }

    function nearBottom(el) {
      return el.scrollHeight - el.scrollTop - el.clientHeight < 80;
    }

    function renderSidebar(summaries, selfId) {
      const sb = document.getElementById("sidebar");
      sb.innerHTML = "";
      if (!summaries.length) {
        const d = document.createElement("div");
        d.className = "empty";
        d.textContent = "暂无联系人(等 directory 或消息总账有记录)";
        sb.appendChild(d);
        return;
      }
      for (const s of summaries) {
        const div = document.createElement("div");
        div.className = "peer" + (s.peer === selectedPeer ? " active" : "");
        div.dataset.peer = s.peer;
        const id = document.createElement("div");
        id.className = "peer-id";
        id.textContent = s.peer + (s.peer === selfId ? " (本机)" : "");
        const pv = document.createElement("div");
        pv.className = "peer-preview";
        pv.textContent = s.last_preview || "(无预览)";
        const meta = document.createElement("div");
        meta.className = "peer-meta";
        const arrow = s.last_direction === "outbound" ? "→" : "←";
        meta.textContent = (s.last_ts ? fmtLocal(s.last_ts) : "") + "  " + arrow + " " + (s.last_record_type || "");
        div.appendChild(id);
        div.appendChild(pv);
        div.appendChild(meta);
        div.addEventListener("click", () => {
          selectedPeer = s.peer;
          sessionStorage.setItem(SK, selectedPeer);
          document.querySelectorAll(".peer").forEach((p) => p.classList.remove("active"));
          div.classList.add("active");
          document.getElementById("thread-head").textContent = "与 " + selectedPeer + " 的对话";
          refresh(true);
        });
        sb.appendChild(div);
      }
    }

    function renderThread(messages) {
      const box = document.getElementById("messages");
      const stick = nearBottom(box);
      box.innerHTML = "";
      if (!selectedPeer) {
        const d = document.createElement("div");
        d.className = "empty";
        d.textContent = "请先在左侧选择一个联系人";
        box.appendChild(d);
        return;
      }
      if (!messages.length) {
        const d = document.createElement("div");
        d.className = "empty";
        d.textContent = "与该联系人暂无消息记录(发一条或等对方发来)";
        box.appendChild(d);
        return;
      }
      for (const m of messages) {
        const row = document.createElement("div");
        row.className = "bubble-row " + (m.direction === "outbound" ? "out" : "in");
        const b = document.createElement("div");
        b.className = "bubble " + (m.direction === "outbound" ? "out" : "in");
        const body = document.createElement("div");
        body.textContent = m.text || "";
        const meta = document.createElement("div");
        meta.className = "bubble-meta";
        meta.textContent =
          fmtLocal(m.ts) +
          "  ·  " +
          (m.channel || "-") +
          "  ·  " +
          (m.record_type || "-") +
          "  ·  cid=" +
          (m.correlation_id || "-");
        b.appendChild(body);
        b.appendChild(meta);
        row.appendChild(b);
        box.appendChild(row);
      }
      if (stick) box.scrollTop = box.scrollHeight;
    }

    async function refresh(forceThread) {
      setErr("");
      const url =
        "/api/snapshot" +
        (selectedPeer ? "?peer=" + encodeURIComponent(selectedPeer) : "");
      const t0 = performance.now();
      let data;
      try {
        const r = await fetch(url);
        if (!r.ok) throw new Error("HTTP " + r.status);
        data = await r.json();
      } catch (e) {
        setErr(String(e));
        return;
      }
      lastSnapshot = data;
      const dt = Math.round(performance.now() - t0);
      document.getElementById("status").textContent =
        "本机 " +
        (data.self_instance_id || "<未配置>") +
        "  ·  轮询 " +
        POLL_MS +
        "ms  ·  上次 " +
        dt +
        "ms  ·  " +
        (data.log_path || "");

      renderSidebar(data.peer_summaries || [], data.self_instance_id || "");

      if (selectedPeer && forceThread !== false) {
        document.getElementById("thread-head").textContent =
          "与 " + selectedPeer + " 的对话";
      }
      if (selectedPeer) {
        renderThread(data.thread || []);
      } else {
        const box = document.getElementById("messages");
        box.innerHTML = "";
        const d = document.createElement("div");
        d.className = "empty";
        d.textContent = "请先在左侧选择一个联系人";
        box.appendChild(d);
      }
    }

    async function sendMsg() {
      const ta = document.getElementById("input");
      const text = (ta.value || "").trim();
      if (!text) return;
      if (!selectedPeer) {
        setErr("请先在左侧选择接收方");
        return;
      }
      const btn = document.getElementById("send");
      btn.disabled = true;
      setErr("");
      try {
        const r = await fetch("/api/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ to: selectedPeer, text: text, channel: "chat" }),
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok) {
          const d = j.detail;
          const msg =
            typeof d === "string"
              ? d
              : Array.isArray(d)
                ? d.map((x) => x.msg || JSON.stringify(x)).join("; ")
                : JSON.stringify(j);
          throw new Error(msg);
        }
        ta.value = "";
        await refresh(true);
      } catch (e) {
        setErr(String(e));
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById("send").addEventListener("click", sendMsg);
    document.getElementById("input").addEventListener("keydown", (ev) => {
      if (ev.key === "Enter" && !ev.shiftKey) {
        ev.preventDefault();
        sendMsg();
      }
    });

    if (selectedPeer) {
      document.getElementById("thread-head").textContent =
        "与 " + selectedPeer + " 的对话";
    }
    refresh(true);
    setInterval(() => refresh(false), POLL_MS);
  </script>
</body>
</html>
